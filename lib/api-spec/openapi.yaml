openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI coach operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ai-coach:
    post:
      operationId: getAiCoachAdvice
      tags: [ai]
      summary: Get AI coach advice
      description: Returns a personalized Korean coaching message based on the user's daily condition data. Falls back to rule-based advice if OpenAI is unavailable.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCoachRequest"
      responses:
        "200":
          description: Advice generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCoachResponse"
        "400":
          description: Invalid request body
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AiCoachRequest:
      type: object
      properties:
        conditionScore:
          type: number
          minimum: 0
          maximum: 100
        conditionLabel:
          type: string
        activityScore:
          type: number
        sleepScore:
          type: number
        hrvScore:
          type: number
        hrvReliability:
          type: string
          enum: [green, amber, red]
        weakestMetric:
          type: string
          enum: [activity, sleep, hrv]
      required:
        - conditionScore
        - conditionLabel
        - activityScore
        - sleepScore
        - hrvScore
        - hrvReliability
        - weakestMetric
    AiCoachResponse:
      type: object
      properties:
        advice:
          type: string
        source:
          type: string
          enum: [groq, gemini, openai, fallback]
      required:
        - advice
        - source
